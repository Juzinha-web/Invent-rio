<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Mensagens | Atendimento Técnico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg:        #0a0c12;
      --surface:   #111520;
      --surface2:  #181d2e;
      --border:    rgba(255,255,255,.07);
      --border2:   rgba(255,255,255,.14);
      --text:      #dde2f0;
      --muted:     #6b7494;
      --accent:    #4f7cff;
      --accent2:   #7c5cfc;
      --green:     #34d399;
      --amber:     #fbbf24;
      --red:       #f87171;
      --teal:      #2dd4bf;
      --purple:    #a78bfa;
      --radius:    10px;
      --radius-lg: 16px;
      --fh:        'Syne', sans-serif;
      --fb:        'DM Sans', sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}

    /* ── Login ── */
    #login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .4s ease}
    #login-screen.hidden{opacity:0;pointer-events:none}
    .login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 50%,rgba(79,124,255,.13) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 30%,rgba(124,92,252,.10) 0%,transparent 60%)}
    .login-bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px}
    .login-card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 0 1px rgba(79,124,255,.15);animation:cardIn .5s cubic-bezier(.16,1,.3,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .login-brand{text-align:center;margin-bottom:36px}
    .login-brand-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;box-shadow:0 8px 24px rgba(79,124,255,.35)}
    .login-brand h1{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-.3px}
    .login-brand p{font-size:13px;color:var(--muted);margin-top:4px}
    .login-field{margin-bottom:18px}
    .login-label{display:block;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .login-input-wrap{position:relative}
    .login-input-wrap .li-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;transition:color .2s}
    .login-input-wrap:focus-within .li-icon{color:var(--accent)}
    .login-input{width:100%;padding:12px 44px 12px 40px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
    .login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.18)}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);cursor:pointer;font-size:14px;transition:color .2s;background:none;border:none;padding:4px}
    .toggle-pw:hover{color:var(--text)}
    .login-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:var(--radius);padding:10px 14px;font-size:13px;display:none;margin-bottom:18px;align-items:center;gap:8px;animation:shake .35s ease both}
    .login-error.show{display:flex}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
    .login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:var(--radius);color:#fff;font-family:var(--fh);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 6px 20px rgba(79,124,255,.35)}
    .login-btn:hover{opacity:.9;transform:translateY(-1px)}
    .login-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--muted)}

    /* ── App ── */
    #app{display:none;min-height:100vh;flex-direction:column}
    #app.visible{display:flex;animation:fadeIn .35s ease both}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header-brand{display:flex;align-items:center;gap:12px}
    .header-brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
    .header-brand-name{font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:-.2px}
    .header-brand-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .header-right{display:flex;align-items:center;gap:12px}
    .search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:7px 16px;width:240px;transition:border-color .2s}
    .search-wrap:focus-within{border-color:var(--accent)}
    .search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:var(--fb);font-size:13px;width:100%}
    .search-wrap input::placeholder{color:var(--muted)}
    .search-wrap i{color:var(--muted);font-size:12px}
    .header-user{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:6px 14px;font-size:13px;font-weight:500}
    .header-user i{color:var(--accent)}
    .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:7px 14px;font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
    .btn-logout:hover{color:var(--red);border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.06)}

    .main{flex:1;padding:28px}

    /* Sync badge */
    .sync-info{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:12px;color:var(--muted)}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .sync-dot.syncing{background:var(--amber);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sync-dot.error{background:var(--red);animation:none}

    /* Tabs */
    .tabs{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
    .tabs::-webkit-scrollbar{height:0}
    .tab{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:30px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:all .2s}
    .tab:hover{color:var(--text);border-color:var(--border2)}
    .tab.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
    .tab-dot{width:7px;height:7px;border-radius:50%}
    .tab[data-cat="confirmed"]  .tab-dot{background:var(--green)}
    .tab[data-cat="rescheduled"].tab-dot{background:var(--amber)}
    .tab[data-cat="absent"]     .tab-dot{background:var(--red)}
    .tab[data-cat="weather"]    .tab-dot{background:var(--teal)}
    .tab[data-cat="editable"]   .tab-dot{background:var(--purple)}
    .tab[data-cat="confirmed"].active {box-shadow:0 0 0 1px var(--green)}
    .tab[data-cat="rescheduled"].active{box-shadow:0 0 0 1px var(--amber)}
    .tab[data-cat="absent"].active    {box-shadow:0 0 0 1px var(--red)}
    .tab[data-cat="weather"].active   {box-shadow:0 0 0 1px var(--teal)}
    .tab[data-cat="editable"].active  {box-shadow:0 0 0 1px var(--purple)}
    .tab-count{background:var(--surface2);border:1px solid var(--border);border-radius:99px;font-size:11px;font-weight:600;padding:1px 7px;color:var(--muted)}

    .panel{display:none}
    .panel.active{display:block;animation:slideUp .2s ease both}
    @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .msg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

    .msg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:relative;transition:border-color .2s,transform .2s,box-shadow .2s;overflow:hidden}
    .msg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
    .msg-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
    .msg-card[data-cat="confirmed"]::before  {background:var(--green)}
    .msg-card[data-cat="rescheduled"]::before{background:var(--amber)}
    .msg-card[data-cat="absent"]::before     {background:var(--red)}
    .msg-card[data-cat="weather"]::before    {background:var(--teal)}
    .msg-card[data-cat="editable"]::before   {background:var(--purple)}
    .msg-card[data-cat="whatsapp"]::before   {background:var(--green)}
    .msg-card[data-cat="other"]::before      {background:var(--muted)}

    .card-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.3px;margin-bottom:12px}
    .card-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
    [data-cat="confirmed"]  .card-badge{background:rgba(52,211,153,.12);color:var(--green)}
    [data-cat="rescheduled"].card-badge{background:rgba(251,191,36,.12);color:var(--amber)}
    [data-cat="absent"]     .card-badge{background:rgba(248,113,113,.12);color:var(--red)}
    [data-cat="weather"]    .card-badge{background:rgba(45,212,191,.12);color:var(--teal)}
    [data-cat="editable"]   .card-badge{background:rgba(167,139,250,.12);color:var(--purple)}
    [data-cat="whatsapp"]   .card-badge{background:rgba(52,211,153,.12);color:var(--green)}
    [data-cat="other"]      .card-badge{background:rgba(107,116,148,.12);color:var(--muted)}

    .card-title{font-family:var(--fh);font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px;line-height:1.4}
    .card-title i{color:var(--muted);font-size:13px;flex-shrink:0}

    .message-content{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:16px;white-space:pre-wrap;word-break:break-word}

    .edit-area{width:100%;min-height:120px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--fb);font-size:13px;resize:vertical;outline:none;transition:border-color .2s;margin-bottom:12px}
    .edit-area:focus{border-color:var(--accent)}

    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--radius);font-family:var(--fb);font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .2s}
    .btn-copy-msg{background:var(--accent);color:#fff}
    .btn-copy-msg:hover{background:#3d6be8;transform:translateY(-1px)}
    .btn-copy-msg.copied{background:var(--green);pointer-events:none}
    .btn-edit-msg{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid rgba(167,139,250,.25)}
    .btn-edit-msg:hover{background:rgba(167,139,250,.25)}
    .btn-save-msg{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.25)}
    .btn-save-msg:hover{background:rgba(52,211,153,.25)}
    .btn-cancel-msg{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
    .btn-cancel-msg:hover{color:var(--text);border-color:var(--border2)}

    .no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
    .no-results i{font-size:32px;margin-bottom:12px;display:block}

    footer{text-align:center;padding:20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}

    @media(max-width:700px){
      .header{padding:0 16px}
      .header-brand-sub,.header-user{display:none}
      .search-wrap{width:160px}
      .main{padding:16px}
      .msg-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">💬</div>
      <h1>Central de Mensagens</h1>
      <p>Atendimento Técnico — Acesso Restrito</p>
    </div>
    <div class="login-error" id="login-error">
      <i class="fas fa-exclamation-circle"></i>
      <span id="login-error-msg">Usuário ou senha incorretos.</span>
    </div>
    <div class="login-field">
      <label class="login-label" for="inp-user">Usuário</label>
      <div class="login-input-wrap">
        <i class="fas fa-user li-icon"></i>
        <input class="login-input" id="inp-user" type="text" placeholder="Digite seu usuário" autocomplete="username" />
      </div>
    </div>
    <div class="login-field">
      <label class="login-label" for="inp-pass">Senha</label>
      <div class="login-input-wrap">
        <i class="fas fa-lock li-icon"></i>
        <input class="login-input" id="inp-pass" type="password" placeholder="Digite sua senha" autocomplete="current-password" />
        <button type="button" class="toggle-pw" id="toggle-pw" title="Mostrar/ocultar senha">
          <i class="far fa-eye" id="pw-icon"></i>
        </button>
      </div>
    </div>
    <button class="login-btn" onclick="doLogin()">
      <i class="fas fa-arrow-right-to-bracket" style="margin-right:6px"></i>Entrar
    </button>
    <div class="login-footer">Sistema de Mensagens Padronizadas &copy; 2025</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="header-brand">
      <div class="header-brand-icon">💬</div>
      <div>
        <div class="header-brand-name">Central de Mensagens</div>
        <div class="header-brand-sub">Atendimento Técnico</div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Buscar mensagem…" />
      </div>
      <div class="header-user">
        <i class="fas fa-circle-user"></i>
        <span id="user-display">admin</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">
        <i class="fas fa-right-from-bracket"></i> Sair
      </button>
    </div>
  </header>
  <main class="main">
    <div class="sync-info">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Carregando mensagens…</span>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
  </main>
  <footer>Sistema de Mensagens Padronizadas &copy; 2025 | Desenvolvido para equipe de atendimento</footer>
</div>

const TABS_DEF = [
  {id:'confirmed',  label:'Confirmados',         cats:['confirmed','whatsapp']},
  {id:'rescheduled',label:'Reagendamentos',       cats:['rescheduled','whatsapp']},
  {id:'absent',     label:'Ausentes',             cats:['absent','whatsapp']},
  {id:'weather',    label:'Condições Climáticas', cats:['weather','whatsapp']},
  {id:'editable',   label:'Mensagem Editável',    cats:['all']},
];

/* ── Estado ── */
let loggedIn  = false;
let sharedEdits = {}; // dados vindos da "nuvem" (API Claude como KV store)

/* ─────────────────────────────────────────────────
   LOGIN
───────────────────────────────────────────────── */
// Toggle senha
document.getElementById('toggle-pw').addEventListener('click', function() {
  const inp  = document.getElementById('inp-pass');
  const icon = document.getElementById('pw-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'far fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'far fa-eye';
  }
});

// Enter nos inputs
['inp-user','inp-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (!u || !p) {
    document.getElementById('login-error-msg').textContent = 'Preencha usuário e senha.';
    errEl.classList.add('show');
    return;
  }
  if (u !== CREDS.user || p !== CREDS.pass) {
    document.getElementById('login-error-msg').textContent = 'Usuário ou senha incorretos.';
    errEl.classList.add('show');
    document.getElementById('inp-pass').value = '';
    document.getElementById('inp-pass').focus();
    return;
  }

  loggedIn = true;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('user-display').textContent = u;

  setTimeout(() => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    initApp();
  }, 400);
}

function doLogout() {
  loggedIn = false;
  // Reset app UI
  document.getElementById('app').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  document.getElementById('tabs').innerHTML   = '';
  document.getElementById('panels').innerHTML = '';
  // Reset search
  document.getElementById('search-input').value = '';
  // Reset login form
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('inp-pass').type  = 'password';
  document.getElementById('pw-icon').className = 'far fa-eye';
  document.getElementById('login-error').classList.remove('show');
  // Show login
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
  ls.classList.remove('hidden');
  setTimeout(() => document.getElementById('inp-user').focus(), 100);
}

/* ─────────────────────────────────────────────────
   DADOS COMPARTILHADOS — Artifact Storage API
   Cada edição é salva como shared=true, então todos
   os usuários do artifact veem os mesmos textos.
───────────────────────────────────────────────── */
async function loadSharedEdits() {
  setSyncState('syncing', 'Sincronizando…');
  try {
    const result = await window.storage.get('msg_edits', true);
    sharedEdits = result ? JSON.parse(result.value) : {};
    setSyncState('ok', 'Sincronizado — dados compartilhados entre todos os PCs');
  } catch {
    // storage key doesn't exist yet or not available — start fresh
    sharedEdits = {};
    setSyncState('ok', 'Pronto — edições serão compartilhadas');
  }
}

async function saveSharedEdits() {
  setSyncState('syncing', 'Salvando…');
  try {
    await window.storage.set('msg_edits', JSON.stringify(sharedEdits), true);
    setSyncState('ok', 'Salvo — visível em todos os PCs');
  } catch {
    setSyncState('error', 'Erro ao salvar. Verifique a conexão.');
  }
}

function setSyncState(state, label) {
  const dot   = document.getElementById('sync-dot');
  const lbl   = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = label;
}

/* ─────────────────────────────────────────────────
   APP
───────────────────────────────────────────────── */
async function initApp() {
  await loadSharedEdits();
  buildTabs();
  document.getElementById('search-input').addEventListener('input', doSearch);
}

function buildTabs() {
  const tabsEl   = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');
  tabsEl.innerHTML   = '';
  panelsEl.innerHTML = '';

  TABS_DEF.forEach((def, ti) => {
    const msgs = def.cats[0] === 'all'
      ? DEFAULT_MESSAGES
      : DEFAULT_MESSAGES.filter(m => def.cats.includes(m.cat));

    // Tab
    const btn = document.createElement('button');
    btn.className = 'tab' + (ti === 0 ? ' active' : '');
    btn.dataset.cat = def.id;
    btn.innerHTML = `<span class="tab-dot"></span>${def.label}<span class="tab-count">${msgs.length}</span>`;
    btn.addEventListener('click', () => switchTab(def.id));
    tabsEl.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'panel' + (ti === 0 ? ' active' : '');
    panel.id = 'panel-' + def.id;

    const grid = document.createElement('div');
    grid.className = 'msg-grid';
    grid.id = 'grid-' + def.id;

    const isEditable = def.id === 'editable';
    msgs.forEach(msg => {
      const text = sharedEdits[msg.id] !== undefined ? sharedEdits[msg.id] : msg.text;
      grid.appendChild(buildCard(msg, text, isEditable));
    });

    panel.appendChild(grid);
    panelsEl.appendChild(panel);
  });
}

function buildCard(msg, text, isEditable) {
  const card = document.createElement('div');
  card.className = 'msg-card';
  card.dataset.cat = msg.cat;
  card.dataset.id  = msg.id;

  const editBtn = isEditable
    ? `<button class="btn btn-edit-msg" onclick="startEdit('${msg.id}')"><i class="fas fa-pen"></i> Editar</button>`
    : '';

  card.innerHTML = `
    <span class="card-badge">${msg.badge}</span>
    <div class="card-title"><i class="${msg.icon}"></i>${escHtml(msg.title)}</div>
    <div class="message-content" id="content-${msg.id}">${escHtml(text)}</div>
    <div class="btn-row" id="btns-${msg.id}">
      ${editBtn}
      <button class="btn btn-copy-msg" id="copy-${msg.id}" onclick="copyMsg('${msg.id}')">
        <i class="far fa-copy"></i> Copiar
      </button>
    </div>`;
  return card;
}

/* ── Tab switch ── */
function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-cat="${id}"]`)?.classList.add('active');
  document.getElementById('panel-' + id)?.classList.add('active');
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.msg-card').forEach(c => c.style.display = '');
  document.querySelectorAll('.no-results').forEach(e => e.remove());
}

/* ── Copy ── */
function copyMsg(id) {
  const msg  = DEFAULT_MESSAGES.find(m => m.id === id);
  const body = document.getElementById('content-' + id)?.innerText ?? '';
  const full = (msg?.title ?? '') + '\n\n' + body.trim();

  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('copy-' + id);
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = full; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* ── Edit ── */
function startEdit(id) {
  const contentEl = document.getElementById('content-' + id);
  const btnsEl    = document.getElementById('btns-' + id);
  const currentText = contentEl?.innerText ?? '';

  const ta = document.createElement('textarea');
  ta.className = 'edit-area';
  ta.id = 'ta-' + id;
  ta.value = currentText;
  contentEl.replaceWith(ta);
  ta.focus();

  btnsEl.innerHTML = `
    <button class="btn btn-save-msg"   onclick="saveEdit('${id}')"><i class="fas fa-check"></i> Salvar</button>
    <button class="btn btn-cancel-msg" onclick="cancelEdit('${id}')"><i class="fas fa-times"></i> Cancelar</button>`;
}

async function saveEdit(id) {
  const ta = document.getElementById('ta-' + id);
  if (!ta) return;
  const newText = ta.value;

  // Update shared state
  sharedEdits[id] = newText;
  await saveSharedEdits();

  restoreContent(id, newText, true);
  showToast('Mensagem salva e sincronizada!');
}

function cancelEdit(id) {
  const ta = document.getElementById('ta-' + id);
  if (!ta) return;
  const originalText = sharedEdits[id] !== undefined
    ? sharedEdits[id]
    : DEFAULT_MESSAGES.find(m => m.id === id)?.text ?? '';
  restoreContent(id, originalText, true);
}

function restoreContent(id, text, isEditable) {
  const ta = document.getElementById('ta-' + id);
  const newContent = document.createElement('div');
  newContent.className = 'message-content';
  newContent.id = 'content-' + id;
  newContent.textContent = text;
  ta?.replaceWith(newContent);

  const btnsEl = document.getElementById('btns-' + id);
  const msg    = DEFAULT_MESSAGES.find(m => m.id === id);
  const editBtn = isEditable
    ? `<button class="btn btn-edit-msg" onclick="startEdit('${id}')"><i class="fas fa-pen"></i> Editar</button>`
    : '';
  btnsEl.innerHTML = `
    ${editBtn}
    <button class="btn btn-copy-msg" id="copy-${id}" onclick="copyMsg('${id}')">
      <i class="far fa-copy"></i> Copiar
    </button>`;
}

/* ── Search ── */
function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const activePanel = document.querySelector('.panel.active');
  if (!activePanel) return;
  const grid  = activePanel.querySelector('.msg-grid');
  const cards = grid.querySelectorAll('.msg-card');
  let found = 0;
  cards.forEach(card => {
    const match = !q || card.innerText.toLowerCase().includes(q);
    card.style.display = match ? '' : 'none';
    if (match) found++;
  });
  grid.querySelectorAll('.no-results').forEach(e => e.remove());
  if (!found && q) {
    const nr = document.createElement('div');
    nr.className = 'no-results';
    nr.innerHTML = `<i class="fas fa-magnifying-glass"></i><p>Nenhuma mensagem encontrada para "<strong>${q}</strong>"</p>`;
    grid.appendChild(nr);
  }
}

/* ── Helpers ── */
function escHtml(s) {
  return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let _toastTimer;
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    Object.assign(t.style, {
      position:'fixed', bottom:'28px', right:'28px',
      background:'var(--surface2)', border:'1px solid var(--border2)',
      color:'var(--text)', padding:'12px 18px', borderRadius:'var(--radius)',
      fontSize:'13px', boxShadow:'0 8px 24px rgba(0,0,0,.5)',
      zIndex:'9999', transition:'opacity .3s', whiteSpace:'nowrap'
    });
    document.body.appendChild(t);
  }
  t.textContent = '✅ ' + msg;
  t.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}
</script>
